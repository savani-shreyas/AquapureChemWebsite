    <link rel="stylesheet" href="./assest/css/style.css" type="text/css">
</head>
<body>
    <header>
        <div class="announcement">
            <div class="container">
                <div class="announcement-main">
                    <p>welcome to aquapureChem</p>
                </div>
            </div>
        </div>
        <div class="header">
            <div class="container">
                <nav>
                    <div class="logo">
                        <a href="./index.html">
                            <img src="./assest/images/Logo/logo.png" alt="Logo" class="logo-image">
                        </a>
                    </div>
                    <div class="mbl-nav-icon-box">
                        <button class="mbl-nav-button" id="MobileavigationOpen">
                            <img src="./assest/images/Banner/mobile-menu.png" alt="Nav Open Icon" class="nav-icon">
                        </button>
                    </div>
                    <div class="navlinks-main" id="navliksMain">
                        <div class="navlinks-inner">
                            <div class="mbl-nav-header">
                                <h2>menu</h2>
                                <button class="mbl-nav-button" id="MobileavigationClose">
                                    <img src="./assest/images/Banner/mobile-menu-close.png" alt="Nav Close Icon" class="nav-icon-close">
                                </button>

                                </li>

                                </li>
                            </ul>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="form-section py-80">
            <form class="enquiry-form" id="myForm" action="https://docs.google.com/forms/d/e/1FAIpQLSdq6fCUTAjGClbZtEaw7ksCxm0ih7WUbcvXOErDB1Q4qSbgPw/formResponse" method="POST" target="hidden_iframe">
                <h1>Product Enquiry Form</h1>
                <div class="enquiry-form-main">
                    <div class="form-group">
                        <label for="FullName">Full Name</label>
                        <input type="text" id="FullName" name="entry.894503115" placeholder="Enter your name" required>
                    </div>
    
                    <div class="form-group">
                        <label for="CompanyName">Company Name</label>
                        <input type="text" id="CompanyName" name="entry.259148489" placeholder="Enter company name">
                    </div>
    
                    <div class="form-group">
                        <label for="EmailAddress">Email Address</label>
                        <input type="email" id="EmailAddress" name="entry.835828538" placeholder="Enter email" required>
                    </div>
    
                    <div class="form-group">
                        <label for="PhoneNumber">Phone Number</label>
                        <input type="tel" id="PhoneNumber" name="entry.1373731007" placeholder="Enter phone number" pattern="[0-9]{10}" maxlength="10" required>
                    </div>
    
                    <div class="form-group">
                        <label for="SelectProduct">Select Product</label>
                        <select id="SelectProduct" name="entry.1224238966">
                            <option>Select Product</option>
                            <option>Sulphuric Acid</option>
                            <option>Hydrochloric Acid</option>
                            <option>Hydrogen Peroxide</option>
                            <option>Calcium Hypochlorite</option>
                        </select>
                    </div>
    
                    <div class="form-group">
                        <label for="QuantityRequired">Quantity Required</label>
                        <input type="text" id="QuantityRequired" name="entry.807621488" placeholder="Example: 500 KG / 1 Ton">
                    </div>
    
                    <div class="form-group">
                        <label for="Packaging Type">Packaging Type</label>
                        <select id="PackagingType" name="entry.487972988">
                            <option>Select Packaging</option>
                            <option>Carboy</option>
                            <option>HDPE Barrel</option>
                            <option>IBC Tank</option>
                            <option>Drum</option>
                        </select>
                    </div>
    
                    <div class="form-group">
                        <label for="DeliveryLocation">Delivery Location</label>
                        <input type="text" id="DeliveryLocation" name="entry.1138143883" placeholder="City / Country">
                    </div>
    
                    <div class="form-group">
                        <label for="AdditionalMessage">Additional Message</label>
                        <textarea rows="6" id="AdditionalMessage" name="entry.1665170127" placeholder="Write your requirements"></textarea>
                    </div>
                </div>
                <div class="form-group text-center">
                    <button type="submit" id="myBtn" class="submit-btn">Submit Enquiry</button>
                </div>
            </form>
            <iframe name="hidden_iframe" class="hidden_iframe" title="Form submission handler" onload="formSubmitted()"></iframe>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-main">

                        </li>

                        </li>

                        </li>
                    </ul>

            </div>
            <div class="footer-copyright-box">
                <p class="footer-copyright">©2026 Aquapure Chem | All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="./assest/js/header.js"></script>

</body>
