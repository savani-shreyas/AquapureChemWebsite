<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquapure Chem | Enquiry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Poppins&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./assest/css/swiper.css" type="text/css">
    <link rel="stylesheet" href="./assest/css/style.css" type="text/css">
</head>

<body>
    <header>
        <div class="announcement">
            <div class="container">
                <div class="announcement-main">
                    <p>welcome to aquapure Chem</p>
                </div>
            </div>
        </div>
        <div class="header">
            <div class="container">
                <nav>
                    <div class="logo">
                        <a href="./index.html">
                            <img src="./assest/images/Logo/logo.png" alt="Logo" class="logo-image">
                        </a>
                    </div>
                    <div class="mbl-nav-icon-box">
                        <button class="mbl-nav-button" id="MobileavigationOpen">
                            <img src="./assest/images/Banner/mobile-menu.png" alt="Nav Open Icon" class="nav-icon">
                        </button>
                    </div>
                    <div class="navlinks-main" id="navliksMain">
                        <div class="navlinks-inner">
                            <div class="mbl-nav-header">
                                <h2>menu</h2>
                                <button class="mbl-nav-button" id="MobileavigationClose">
                                    <img src="./assest/images/Banner/mobile-menu-close.png" alt="Nav Close Icon"
                                        class="nav-icon-close">
                                </button>
                            </div>
                            <ul class="navlink-box">
                                <li>
                                    <a href="./product.html" class="navlinks">product</a>
                                </li>
                                <li>
                                    <a href="./about-us.html" class="navlinks">about us</a>
                                </li>
                                <li>
                                    <a href="./contact.html" class="navlinks">contact us</a>
                                </li>
                                <li>
                                    <a href="./enquiry.html" class="navlinks active">enquiry</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="form-section py-80">
            <form class="enquiry-form" id="myForm"
                action="https://docs.google.com/forms/d/e/1FAIpQLSdq6fCUTAjGClbZtEaw7ksCxm0ih7WUbcvXOErDB1Q4qSbgPw/formResponse"
                method="POST" target="hidden_iframe">
                <h1>Product Enquiry Form</h1>
                <div class="enquiry-form-main">
                    <div class="form-group">
                        <label for="FullName">Full Name</label>
                        <input type="text" id="FullName" name="entry.894503115" placeholder="Enter your name" required>
                    </div>

                    <div class="form-group">
                        <label for="CompanyName">Company Name</label>
                        <input type="text" id="CompanyName" name="entry.259148489" placeholder="Enter company name">
                    </div>

                    <div class="form-group">
                        <label for="EmailAddress">Email Address</label>
                        <input type="email" id="EmailAddress" name="entry.835828538" placeholder="Enter email" required>
                    </div>

                    <div class="form-group">
                        <label for="PhoneNumber">Phone Number</label>
                        <input type="tel" id="PhoneNumber" name="entry.1373731007" placeholder="Enter phone number"
                            pattern="[0-9]{10}" maxlength="10" required>
                    </div>

                    <div class="form-group">
                        <label for="SelectProduct">Select Product</label>
                        <select id="SelectProduct" name="entry.1224238966">
                            <option>Select Product</option>
                            <option>Refined 30 Mesh Salt</option>
                            <option>Table Salt</option>
                            <option>Refined Free Flow Iodized Salt</option>
                            <option>Pure Salt (Low Hardness Salt)</option>
                            <option>Crystalline Salt</option>
                            <option>Refined Medium Crystal Salt</option>
                            <option>Superfine Salt</option>
                            <option>Oversize Salt</option>
                            <option>Common Salt (Raw Crystal Salt)</option>
                            <option>Zinc Sulphate</option>
                            <option>Ferrous Sulphate</option>
                            <option>Copper Sulphate</option>
                            <option>Caustic Soda Flakes & Pearls</option>
                            <option>Hydrochloric Acid</option>
                            <option>Acetic Acid (Glacial)</option>
                            <option>Carboxy Methyl Tamarind</option>
                            <option>Formic Acid</option>
                            <option>Hydrogen Peroxide (35% / 50%)</option>
                            <option>Oxalic Acid</option>
                            <option>Sodium Bicarbonate</option>
                            <option>Sodium Hydrosulfite</option>
                            <option>Sodium Sulphate</option>
                            <option>Stable Calcium Hypochlorite (34-36%)</option>
                            <option>Acid Orange II</option>
                            <option>Red A</option>
                            <option>Scarlet 3R</option>
                            <option>Red 3BN</option>
                            <option>Metanil Yellow</option>
                            <option>Chrysophenine</option>
                            <option>Red-12</option>
                            <option>Direct Black</option>
                            <option>Paper Yellow</option>
                            <option>Basic Auramine</option>
                            <option>Bismark Brown R</option>
                            <option>Bismark Brown Y</option>
                            <option>Precipitated Silica for Salt Grade</option>
                            <option>Precipitated Silica</option>
                            <option>Amorphous Precipitated Silica</option>
                            <option>Precipitated Silica for Pesticides Grade</option>
                            <option>Precipitated Silica for Silicon Rubber Grade</option>
                            <option>Precipitated Silica for Rubber Grade</option>
                            <option>Precipitated Silica for Food Grade</option>
                            <option>Precipitated Silica for Animal Feed Grade</option>
                            <option>Silicon Dioxide Powder</option>
                            <option>Fine Silica Powder</option>
                            <option>Silica Gel</option>
                            <option>Anticaking Agent</option>
                            <option>Phthalocyanine Green 7</option>
                            <option>Phthalocyanine Green 36</option>
                            <option>Phthalocyanine Beta Blue</option>
                            <option>Phthalocyanine Alpha Blue</option>
                            <option>Caustic Soda Flakes & Pearl</option>
                            <option>LABSA</option>
                            <option>Soda Ash Light & Dense</option>
                            <option>SLES</option>
                            <option>Sodium Silicate Solid</option>
                            <option>STPP</option>
                            <option>Citric Acid</option>
                            <option>Phosphoric Acid</option>
                            <option>Phosphoric Acid Food Grade</option>
                            <option>Benzoic Acid</option>
                            <option>Sodium Benzoate</option>
                            <option>Sorbitol</option>
                            <option>Sulphuric Acid</option>
                            <option>Acetic Acid</option>
                            <option>Nitric Acid</option>
                            <option>Aluminium Sulphate</option>
                            <option>EDTA-TetraSodium</option>
                            <option>Ferric Chloride (40-42%)</option>
                            <option>Calcium Hypochlorite (65-70%)</option>
                            <option>Sodium Hypochlorite (5-12%)</option>
                            <option>Ethyl Centralite II (CAS 85-98-3)</option>
                            <option>Caustic Soda Flakes</option>
                            <option>Hydrochloric Acid (33%-35%)</option>
                            <option>Soda Ash Light</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="QuantityRequired">Quantity Required</label>
                        <input type="text" id="QuantityRequired" name="entry.807621488"
                            placeholder="Example: 500 KG / 1 Ton">
                    </div>

                    <div class="form-group">
                        <label for="Packaging Type">Packaging Type</label>
                        <select id="PackagingType" name="entry.487972988">
                            <option>Select Packaging</option>
                            <option>Carboys</option>
                            <option>IBC Tank</option>
                            <option>HM-HDPE Barrels</option>
                            <option>HDPE Drum</option>
                            <option>50 KG HDPE Drum</option>
                            <option>25 KG Plastic Drum</option>
                            <option>Tablet</option>
                            <option>PVC Plastic Bag</option>
                            <option>Plastic Drum</option>
                            <option>Fiber Drum</option>
                            <option value="Custom Packaging - Client requirements">Custom Packaging - Client
                                requirements</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="DeliveryLocation">Delivery Location</label>
                        <input type="text" id="DeliveryLocation" name="entry.1138143883" placeholder="City / Country">
                    </div>

                    <div class="form-group" id="CustomPackagingBox" style="display: none;">
                        <label for="CustomPackaging">Custom Packaging</label>
                        <input type="text" id="CustomPackaging" name="entry.418896607" placeholder="Custom Packaging">
                    </div>

                    <div class="form-group">
                        <label for="AdditionalMessage">Additional Message</label>
                        <textarea rows="6" id="AdditionalMessage" name="entry.1665170127"
                            placeholder="Write your requirements"></textarea>
                    </div>
                </div>
                <div class="form-group text-center">
                    <button type="submit" id="myBtn" class="submit-btn">Submit Enquiry</button>
                </div>
            </form>
            <iframe name="hidden_iframe" class="hidden_iframe" title="Form submission handler"
                onload="formSubmitted()"></iframe>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-main">
                <div class="footer-box">
                    <img src="./assest/images/Logo/logo.png" alt="Logo" class="footer-logo">
                </div>
                <div class="footer-box">
                    <ul class="footer-box-links">
                        <li>
                            <a href="./product.html" class="footer-link">product</a>
                        </li>
                        <li>
                            <a href="./about-us.html" class="footer-link">about us</a>
                        </li>
                        <li>
                            <a href="./contact.html" class="footer-link">contact us</a>
                        </li>
                        <li>
                            <a href="./enquiry.html" class="footer-link">enquiry</a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="footer-copyright-box">
                <p class="footer-copyright">©2026 Aquapure Chem | All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="./assest/js/header.js"></script>
    <script src="./assest/js/enquiry.js"></script>
    <script src="./assest/js/script.js"></script>
    <script>
        const packagingSelect = document.getElementById("PackagingType");
        const customBox = document.getElementById("CustomPackagingBox");

        packagingSelect.addEventListener("change", function () {
            if (this.value === "Custom Packaging - Client requirements") {
                customBox.style.display = "block";
            } else {
                customBox.style.display = "none";
                document.getElementById("CustomPackaging").value = "";
            }
        });
    </script>
</body>

</html>
